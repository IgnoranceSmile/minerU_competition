<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', PingFang SC, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="ui" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="engine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <linearGradient id="data" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b7280" />
      <stop offset="100%" stop-color="#9ca3af" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569" />
    </marker>
  </defs>

  <rect width="920" height="700" fill="#f8fafc" />

  <text x="460" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">DrawAgent 系统架构</text>
  <text x="460" y="56" text-anchor="middle" font-size="13" fill="#64748b">基于 MinerU 的工程图纸智能解析 Data Agent</text>

  <!-- UI 层 -->
  <rect x="60" y="80" width="800" height="68" rx="10" fill="url(#ui)" opacity="0.95" />
  <text x="80" y="106" font-size="14" font-weight="700" fill="#fff">UI 层</text>
  <text x="80" y="126" font-size="12" fill="#fff">React 18 + TypeScript + Vite · 图纸查看 · 点选/框选 · SSE 流式对话</text>
  <text x="780" y="126" text-anchor="end" font-size="11" fill="#fff" opacity="0.9">frontend/</text>

  <!-- TaskPlanner 层 -->
  <rect x="60" y="170" width="800" height="86" rx="10" fill="url(#agent)" opacity="0.95" />
  <text x="80" y="196" font-size="14" font-weight="700" fill="#fff">TaskPlanner 层（Agent 编排）</text>
  <text x="80" y="218" font-size="12" fill="#fff">DeepSeek-Chat（OpenAI 兼容）· 多步任务规划 · 工具调用循环 · 异常自愈</text>
  <text x="80" y="238" font-size="11" fill="#fff" opacity="0.9">事件流：reasoning · plan · progress · tool_start · tool_result · done</text>
  <text x="780" y="238" text-anchor="end" font-size="11" fill="#fff" opacity="0.9">src/harness/agent.py</text>

  <!-- Pipeline 层 -->
  <rect x="60" y="278" width="800" height="118" rx="10" fill="url(#pipe)" opacity="0.95" />
  <text x="80" y="304" font-size="14" font-weight="700" fill="#fff">Pipeline 层（5 个处理流水线）</text>

  <g font-size="11" fill="#064e3b">
    <rect x="80"  y="320" width="142" height="60" rx="6" fill="#fff" opacity="0.95" />
    <text x="151" y="338" text-anchor="middle" font-weight="700">P1 drawing_qa</text>
    <text x="151" y="356" text-anchor="middle">单图问答</text>
    <text x="151" y="372" text-anchor="middle" fill="#475569">图签 · 图号 · 设计号</text>

    <rect x="232" y="320" width="142" height="60" rx="6" fill="#fff" opacity="0.95" />
    <text x="303" y="338" text-anchor="middle" font-weight="700">P2 table_extract</text>
    <text x="303" y="356" text-anchor="middle">表格精准提取</text>
    <text x="303" y="372" text-anchor="middle" fill="#475569">门窗表 · 材料表</text>

    <rect x="384" y="320" width="142" height="60" rx="6" fill="#fff" opacity="0.95" />
    <text x="455" y="338" text-anchor="middle" font-weight="700">P3 batch_parse</text>
    <text x="455" y="356" text-anchor="middle">批量解析统计</text>
    <text x="455" y="372" text-anchor="middle" fill="#475569">按专业并行</text>

    <rect x="536" y="320" width="142" height="60" rx="6" fill="#fff" opacity="0.95" />
    <text x="607" y="338" text-anchor="middle" font-weight="700">P4 cross_drawing</text>
    <text x="607" y="356" text-anchor="middle">跨图比对</text>
    <text x="607" y="372" text-anchor="middle" fill="#475569">设计号/目录/引用</text>

    <rect x="688" y="320" width="142" height="60" rx="6" fill="#fff" opacity="0.95" />
    <text x="759" y="338" text-anchor="middle" font-weight="700">P5 quality_verify</text>
    <text x="759" y="356" text-anchor="middle">质量验证</text>
    <text x="759" y="372" text-anchor="middle" fill="#475569">完整性 · 评分</text>
  </g>

  <!-- Engine 层 -->
  <rect x="60" y="416" width="800" height="86" rx="10" fill="url(#engine)" opacity="0.95" />
  <text x="80" y="442" font-size="14" font-weight="700" fill="#fff">Engine 层</text>

  <rect x="80"  y="454" width="180" height="38" rx="6" fill="#fff" opacity="0.95" />
  <text x="170" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">MinerU 解析器</text>
  <text x="170" y="486" text-anchor="middle" font-size="11" fill="#475569">hybrid-auto-engine</text>

  <rect x="270" y="454" width="180" height="38" rx="6" fill="#fff" opacity="0.95" />
  <text x="360" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">LLM 网关</text>
  <text x="360" y="486" text-anchor="middle" font-size="11" fill="#475569">OpenAI 兼容协议</text>

  <rect x="460" y="454" width="180" height="38" rx="6" fill="#fff" opacity="0.95" />
  <text x="550" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">渲染器 + 索引器</text>
  <text x="550" y="486" text-anchor="middle" font-size="11" fill="#475569">PyMuPDF · PIL</text>

  <rect x="650" y="454" width="180" height="38" rx="6" fill="#fff" opacity="0.95" />
  <text x="740" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">两级缓存</text>
  <text x="740" y="486" text-anchor="middle" font-size="11" fill="#475569">内存 + 磁盘 pickle</text>

  <!-- Data 层 -->
  <rect x="60" y="522" width="800" height="68" rx="10" fill="url(#data)" opacity="0.95" />
  <text x="80" y="548" font-size="14" font-weight="700" fill="#fff">Data 层</text>
  <text x="80" y="568" font-size="12" fill="#fff">工程图纸 PDF（按专业目录组织） + MinerU content_list.json + Markdown</text>
  <text x="780" y="568" text-anchor="end" font-size="11" fill="#fff" opacity="0.9">data/origin · data/mineru</text>

  <!-- 连接箭头 -->
  <line x1="460" y1="148" x2="460" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="460" y1="256" x2="460" y2="278" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="460" y1="396" x2="460" y2="416" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="460" y1="502" x2="460" y2="522" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

  <!-- 底部数据流 -->
  <text x="460" y="618" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Agent 任务执行流</text>

  <g font-size="11" fill="#334155">
    <rect x="80" y="630" width="120" height="40" rx="6" fill="#fff" stroke="#cbd5e1" />
    <text x="140" y="648" text-anchor="middle" font-weight="700">用户提问</text>
    <text x="140" y="664" text-anchor="middle" fill="#64748b">prompt</text>

    <rect x="220" y="630" width="120" height="40" rx="6" fill="#fff" stroke="#cbd5e1" />
    <text x="280" y="648" text-anchor="middle" font-weight="700">LLM 任务规划</text>
    <text x="280" y="664" text-anchor="middle" fill="#64748b">function call</text>

    <rect x="360" y="630" width="120" height="40" rx="6" fill="#fff" stroke="#cbd5e1" />
    <text x="420" y="648" text-anchor="middle" font-weight="700">Pipeline 执行</text>
    <text x="420" y="664" text-anchor="middle" fill="#64748b">P1-P5</text>

    <rect x="500" y="630" width="120" height="40" rx="6" fill="#fff" stroke="#cbd5e1" />
    <text x="560" y="648" text-anchor="middle" font-weight="700">异常自愈</text>
    <text x="560" y="664" text-anchor="middle" fill="#64748b">retry / 换方案</text>

    <rect x="640" y="630" width="120" height="40" rx="6" fill="#fff" stroke="#cbd5e1" />
    <text x="700" y="648" text-anchor="middle" font-weight="700">结果汇总</text>
    <text x="700" y="664" text-anchor="middle" fill="#64748b">trace 落盘</text>

    <line x1="200" y1="650" x2="220" y2="650" stroke="#475569" marker-end="url(#arrow)" />
    <line x1="340" y1="650" x2="360" y2="650" stroke="#475569" marker-end="url(#arrow)" />
    <line x1="480" y1="650" x2="500" y2="650" stroke="#475569" marker-end="url(#arrow)" />
    <line x1="620" y1="650" x2="640" y2="650" stroke="#475569" marker-end="url(#arrow)" />
  </g>
</svg>
